<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rohit Sharma - Achievements & Records</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: fadeIn 0.6s ease;
        }

        .header {
            background: linear-gradient(135deg, #1F4E78 0%, #2E5C8A 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .header p {
            font-size: 1.3em;
            font-style: italic;
            opacity: 0.9;
            font-weight: 300;
        }

        .content {
            padding: 32px;
        }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 14px;
        }

        .card {
            border: 1.5px solid #e0e8f0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            transition: box-shadow 0.25s ease;
        }

        .card:hover {
            box-shadow: 0 4px 18px rgba(31, 78, 120, 0.14);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            background: #1F4E78;
        }

        .card-number {
            min-width: 30px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.8em;
            flex-shrink: 0;
        }

        .card-title {
            flex: 1;
            font-weight: 600;
            font-size: 0.9em;
            color: white;
            line-height: 1.45;
        }

        .card-body-content {
            padding: 14px 16px;
            color: #4a5568;
            font-size: 0.88em;
            line-height: 1.75;
            background: #ffffff;
        }

        .footer {
            background: #f9f9f9;
            padding: 24px 40px;
            border-top: 2px solid #e0e0e0;
            text-align: center;
            font-size: 0.88em;
            color: #666;
            line-height: 1.8;
        }

        .footer strong {
            color: #1F4E78;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .header h1  { font-size: 2em; }
            .header p   { font-size: 1em; }
            .content    { padding: 20px; }
            .cards-grid { grid-template-columns: 1fr; gap: 12px; }
        }

        @media (max-width: 480px) {
            body        { padding: 12px; }
            .header     { padding: 28px 16px; }
            .header h1  { font-size: 1.6em; letter-spacing: 1px; }
            .header p   { font-size: 0.9em; }
            .content    { padding: 14px; }
            .card-title { font-size: 0.88em; }
        }

        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; border-radius: 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>ROHIT SHARMA</h1>
            <p>Achievements &amp; Records (Fact-Verified)</p>
        </div>

        <div class="content">
            <div class="cards-grid" id="cardsGrid"></div>
        </div>

        <div class="footer">
            <strong>Note:</strong> All facts verified from multiple independent sources including ESPN Cricinfo, Britannica, BCCI official records, and ICC official sources. Last updated: June 2026
        </div>
    </div>

    <script>
        const achievements = [
            { title: "Highest ODI score: 264 vs Sri Lanka",            details: "World record individual score in ODI cricket. Scored off 173 balls with 33 fours and 9 sixes at Eden Gardens, Kolkata on Nov 13, 2014." },
            { title: "Only player with 3 ODI double centuries",         details: "Unique record — no other player has scored even 2 double centuries. Scores: 264, 209*, 208*." },
            { title: "Most sixes in international cricket",             details: "Surpassed Chris Gayle's 553 sixes. Demonstrates aggressive batting style and dominance across all formats." },
            { title: "Most centuries at Cricket World Cups: 7",         details: "Surpassed Sachin Tendulkar's 6 centuries. Includes 5 in 2019 and additional centuries in 2015 & 2023 World Cups." },
            { title: "Joint most T20I centuries: 5",                    details: "Shares record with Glenn Maxwell and Suryakumar Yadav. Recently achieved oldest T20I centurion at age 36 years 262 days." },
            { title: "Most runs in T20 Internationals",                 details: "4,231 runs across 159 T20I matches. All-time leading T20I run-scorer for India." },
            { title: "Won 2024 T20 World Cup as captain",               details: "Defeated South Africa by 7 runs in the final at Barbados. India's 2nd T20 World Cup title; first ICC trophy in 11 years." },
            { title: "Won 2025 ICC Champions Trophy as captain",        details: "Successfully led India to championship victory. 2nd major ICC trophy as captain." },
            { title: "Hit 600 sixes in international cricket",          details: "Achieved in June 2024 during the match against Ireland. Milestone across all international formats (Tests, ODIs, T20Is)." },
            { title: "Surpassed Chris Gayle's international sixes",     details: "Broke Gayle's record of 553 sixes in October 2023 during the 2023 Cricket World Cup match vs Afghanistan." },
            { title: "5 IPL titles as Mumbai Indians captain",          details: "Won in 2013, 2015, 2017, 2019, 2020. Captained MI for 11 consecutive years (2013–2023)." },
            { title: "Joint most successful IPL captain",               details: "Shares record with MS Dhoni (5 titles each). Most successful captain in IPL history alongside Dhoni." },
            { title: "Fastest T20I century: 35 balls",                  details: "Scored 118 vs Sri Lanka in Indore (Dec 2017). Joint record with David Miller; strike rate of 337.14." },
            { title: "50+ wins as T20I captain",                        details: "Only cricketer to win 50+ T20I matches as captain. Demonstrates unmatched consistency in leadership." },
            { title: "2nd fastest to 11,000 ODI runs",                  details: "Reached milestone in 261 innings. Only Virat Kohli (222 innings) was faster. Achieved in Champions Trophy 2025 vs Bangladesh." },
            { title: "First Indian to 300 sixes in ODI format",         details: "Achieved in October 2023 during the India-Pakistan ODI match at Narendra Modi Stadium." },
            { title: "First Indian with 50 ODI sixes in calendar year", details: "Achieved in 2023 during the match vs New Zealand. Only Indian to accomplish this milestone." },
            { title: "5 centuries in 2019 World Cup",                   details: "Broke Kumar Sangakkara's single-edition record of 4 centuries. Tournament's leading run-scorer with 648 runs." },
            { title: "Won multiple ICC tournaments",                    details: "Champions Trophy (2013), Asia Cup (2010, 2016, 2018, 2023), Nidahas Trophy (2018) — total 8 ICC tournament wins." },
            { title: "Member of 2007 T20 World Cup winning team",       details: "Played as finisher; scored unbeaten 30 in the final vs Pakistan. Part of India's first T20 World Cup triumph." },
            { title: "Only Indian to win 2 T20 World Cups",             details: "Won as player in 2007 and as captain in 2024. Unique achievement among Indian cricketers." },
            { title: "50 international centuries",                      details: "12 Tests, 33 ODIs, 5 T20Is. Reached milestone in October 2025 vs Australia. Among cricket's elite batsmen." },
            { title: "Padma Shri Award (2026)",                         details: "India's 4th highest civilian award. Recognition for outstanding achievements in sports." },
            { title: "Khel Ratna Award (2020)",                         details: "India's highest sports honor (renamed Major Dhyan Chand Khel Ratna). Recognition for lifetime sports excellence." },
            { title: "Arjuna Award (2015)",                             details: "India's 2nd highest sports award. Honors outstanding individual sporting achievement." },
            { title: "310 sixes in IPL",                                details: "Most sixes by any Indian batsman in IPL history. Defined by his signature pull shot and power-hitting ability." },
            { title: "7,183 runs for Mumbai Indians",                   details: "2nd highest MI run-scorer after Kieron Pollard. Demonstrates consistency across 18+ seasons." },
            { title: "Only 2 IPL centuries",                            details: "109* vs KKR (2012), 105* vs CSK (2024). Rare achievement; reflects focus on quick fifties over slow centuries." },
            { title: "3 ODI double centuries (unique)",                 details: "264, 209*, 208*. No other player has even 2 double centuries in ODI history." },
            { title: "Retired from T20Is (June 29, 2024)",              details: "Announced retirement after winning the 2024 T20 World Cup. Ended a 17-year T20I career on a high note." },
            { title: "Retired from Tests (May 7, 2025)",                details: "Announced retirement ahead of the England tour. Ended Test career after 67 matches with 4,301 runs." },
            { title: "3rd Indian captain to win major ICC event",       details: "Joins Kapil Dev (1983 World Cup) and MS Dhoni (2007 T20 WC, 2011 WC, 2013 CT) as ICC trophy-winning Indian captains." }
        ];

        const grid = document.getElementById('cardsGrid');

        achievements.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-number">${index + 1}</div>
                    <div class="card-title">${item.title}</div>
                </div>
                <div class="card-body-content">${item.details}</div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
